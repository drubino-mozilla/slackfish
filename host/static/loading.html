<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/png" sizes="32x32" href="http://localhost:7890/icons/icon_32x32.png">
<title>Slackfish</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1d21;
  color: #d1d2d3;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
}
.logo { font-size: 28px; font-weight: 700; color: #f0f0f0; }
.status { font-size: 14px; color: #8b8b8d; min-height: 20px; }
.bar-track {
  width: 320px;
  height: 4px;
  background: #2c2d31;
  border-radius: 2px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  width: 0%;
  background: #1264a3;
  border-radius: 2px;
  transition: width 0.4s ease-out;
}
.error {
  font-size: 13px;
  color: #e74c3c;
  display: none;
  text-align: center;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="logo">Slackfish</div>
<div class="bar-track"><div class="bar-fill" id="bar"></div></div>
<div class="status" id="status">Starting server...</div>
<div class="error" id="error"></div>
<script>
const bar = document.getElementById("bar");
const status = document.getElementById("status");
const errorEl = document.getElementById("error");
const SERVER = "http://localhost:7890";
const startTime = Date.now();
let phase = "server"; // server -> channels -> ready

function fakeProgress() {
  // Logarithmic fill: fast at first, asymptotically approaches 85%
  // Leaves room for the real data-loading phases to fill the rest
  const elapsed = (Date.now() - startTime) / 1000;
  if (phase === "server") {
    const pct = 85 * (1 - Math.exp(-elapsed / 12));
    bar.style.width = pct + "%";
  }
}

const progressTimer = setInterval(fakeProgress, 200);

async function poll() {
  try {
    const res = await fetch(SERVER + "/api/stats", { signal: AbortSignal.timeout(2000) });
    if (!res.ok) throw new Error("not ready");
    const stats = await res.json();

    // Server is up
    clearInterval(progressTimer);
    phase = "channels";
    bar.style.width = "90%";
    status.textContent = `Loading ${stats.channels_cached} channels...`;

    // Warm up the channels endpoint so the main page loads instantly
    await fetch(SERVER + "/api/channels");
    bar.style.width = "100%";
    status.textContent = "Ready";

    setTimeout(() => { window.location.href = SERVER; }, 300);
  } catch (e) {
    const elapsed = (Date.now() - startTime) / 1000;
    if (elapsed > 120) {
      clearInterval(progressTimer);
      status.textContent = "";
      errorEl.style.display = "block";
      errorEl.textContent = "Server didn't start after 2 minutes.\nTry running: python host/slackfish_web.py";
      return;
    }
    setTimeout(poll, 500);
  }
}

poll();
</script>
</body>
</html>
